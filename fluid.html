<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kelvin-Helmholtz Fluid Dynamics</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08081a;color:#d0d0e0;font-family:'Menlo','Consolas','Monaco',monospace;min-height:100vh}
#app{max-width:720px;margin:0 auto;padding:24px}

header{display:flex;align-items:baseline;gap:20px;margin-bottom:20px;border-bottom:1px solid #1a1a3a;padding-bottom:14px;flex-wrap:wrap}
header h1{font-size:18px;font-weight:600;color:#e8e8f0;letter-spacing:-0.5px}
#iter-counter{font-size:13px;color:#888}
#iter-num{color:#d4a843;font-weight:700}
#re-display{font-size:12px;color:#555;margin-left:auto}
#re-val{color:#2aa198}

#canvas-wrapper{text-align:center;margin-bottom:20px}
#canvas-wrapper canvas{border:1px solid #1a1a3a;border-radius:6px;display:block;margin:0 auto;image-rendering:auto;max-width:100%}

.control-group{background:#0e0e24;border:1px solid #1a1a3a;border-radius:8px;padding:14px 16px;margin-bottom:12px}
.control-group h3{font-size:11px;color:#555;font-weight:400;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}

.param-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.param-row:last-child{margin-bottom:0}
.param-label{font-size:11px;color:#888;width:100px;flex-shrink:0}
.param-slider{flex:1;-webkit-appearance:none;height:4px;background:#1a1a3a;border-radius:2px;outline:none}
.param-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#2aa198;cursor:pointer}
.param-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#2aa198;cursor:pointer;border:none}
.param-value{font-size:11px;color:#ddd;width:70px;text-align:right;font-variant-numeric:tabular-nums}

#action-buttons{display:flex;gap:8px;margin-top:4px}
.action-btn{border:none;color:#fff;padding:7px 18px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all 0.15s}
.action-btn.primary{background:#2aa198}.action-btn.primary:hover{background:#35b5ab}
.action-btn.secondary{background:#1a1a3a;color:#999}.action-btn.secondary:hover{background:#2a2a4a;color:#ddd}
.action-btn:disabled{background:#1a1a2a!important;color:#444!important;cursor:not-allowed}

.colormap-row{display:flex;gap:6px;align-items:center;margin-top:4px}
.cmap-btn{background:#111128;border:1px solid #2a2a4a;color:#999;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:10px;transition:all 0.15s}
.cmap-btn:hover{border-color:#4a4a6a;color:#ddd}
.cmap-btn.active{background:#1a1a3a;border-color:#2aa198;color:#2aa198}

#error-msg{color:#ff6b6b;font-size:12px;text-align:center;padding:20px;display:none}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Kelvin-Helmholtz Fluid</h1>
    <div id="iter-counter">Step <span id="iter-num">0</span></div>
    <div id="re-display">Re = <span id="re-val">—</span></div>
  </header>

  <div id="error-msg"></div>
  <div id="canvas-wrapper"></div>

  <div class="control-group">
    <h3>Physics (live)</h3>
    <div class="param-row">
      <span class="param-label">Viscosity (ν)</span>
      <input class="param-slider" type="range" id="sl-nu" min="-4" max="-1.5" step="0.05" value="-3">
      <span class="param-value" id="val-nu">0.0010</span>
    </div>
  </div>

  <div class="control-group">
    <h3>Initial Condition (reset to apply)</h3>
    <div class="param-row">
      <span class="param-label">Shear velocity</span>
      <input class="param-slider" type="range" id="sl-vshear" min="0.5" max="5.0" step="0.1" value="2.0">
      <span class="param-value" id="val-vshear">2.00</span>
    </div>
    <div class="param-row">
      <span class="param-label">Layer thickness (δ)</span>
      <input class="param-slider" type="range" id="sl-delta" min="0.01" max="0.15" step="0.005" value="0.05">
      <span class="param-value" id="val-delta">0.050</span>
    </div>
    <div class="param-row">
      <span class="param-label">Perturbation (A)</span>
      <input class="param-slider" type="range" id="sl-apert" min="0.01" max="0.5" step="0.01" value="0.1">
      <span class="param-value" id="val-apert">0.10</span>
    </div>
    <div class="param-row">
      <span class="param-label">Wavenumber (k)</span>
      <input class="param-slider" type="range" id="sl-kpert" min="1" max="8" step="0.5" value="4">
      <span class="param-value" id="val-kpert">4.0</span>
    </div>
  </div>

  <div class="control-group">
    <h3>Simulation</h3>
    <div class="param-row">
      <span class="param-label">Timestep (dt)</span>
      <input class="param-slider" type="range" id="sl-dt" min="0.001" max="0.02" step="0.001" value="0.005">
      <span class="param-value" id="val-dt">0.005</span>
    </div>
    <div class="param-row">
      <span class="param-label">Steps / frame</span>
      <input class="param-slider" type="range" id="sl-spf" min="1" max="30" step="1" value="8">
      <span class="param-value" id="val-spf">8</span>
    </div>
    <div class="param-row">
      <span class="param-label">Jacobi iters</span>
      <input class="param-slider" type="range" id="sl-jacobi" min="10" max="100" step="5" value="40">
      <span class="param-value" id="val-jacobi">40</span>
    </div>
    <div class="param-row">
      <span class="param-label">Colormap</span>
      <div class="colormap-row">
        <button class="cmap-btn active" data-cmap="0">Cyan-Orange</button>
        <button class="cmap-btn" data-cmap="1">Cool-Warm</button>
        <button class="cmap-btn" data-cmap="2">Inferno</button>
      </div>
    </div>
    <div id="action-buttons">
      <button class="action-btn primary" id="btn-play">Pause</button>
      <button class="action-btn secondary" id="btn-reset">Reset</button>
    </div>
  </div>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

// ── Shaders ─────────────────────────────────────────────────────

const VERT = `
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}`;

// Initial condition: double shear layer (periodic in both x and y)
// Two counter-signed shear layers at y=0.25 and y=0.75 ensure zero mean vorticity,
// which is required for the Poisson equation to have a solution with periodic BCs.
const INIT_FRAG = `
precision highp float;
uniform vec2 resolution;
uniform float vShear, delta, aPert, kPert;
varying vec2 vUv;

float sech2(float x) {
  float ex = exp(clamp(x, -20.0, 20.0));
  float ch = (ex + 1.0 / ex) * 0.5;
  return 1.0 / (ch * ch);
}

void main() {
  float x = vUv.x;
  float y = vUv.y;

  // Two shear layers with opposite sign → zero net circulation
  float layer1 = sech2((y - 0.25) / delta);
  float layer2 = sech2((y - 0.75) / delta);

  // Sinusoidal perturbation seeds the instability
  float pert = 1.0 + aPert * sin(6.283185307 * kPert * x);

  // Vorticity: ω = -(v_shear / δ) · (layer1 - layer2) · perturbation
  float omega = -(vShear / delta) * (layer1 - layer2) * pert;

  gl_FragColor = vec4(omega, 0.0, 0.0, 1.0);
}`;

// Jacobi iteration for Poisson equation: ∇²ψ = -ω
// Each iteration: ψ_new = (ψ_E + ψ_W + ψ_N + ψ_S + dx²·ω) / 4
const JACOBI_FRAG = `
precision highp float;
uniform sampler2D tOmega;
uniform sampler2D tPsi;
uniform vec2 resolution;
varying vec2 vUv;

void main() {
  vec2 tx = 1.0 / resolution;
  float dx = tx.x;

  float omega = texture2D(tOmega, vUv).r;

  float pE = texture2D(tPsi, vUv + vec2( tx.x, 0.0)).r;
  float pW = texture2D(tPsi, vUv + vec2(-tx.x, 0.0)).r;
  float pN = texture2D(tPsi, vUv + vec2(0.0,  tx.y)).r;
  float pS = texture2D(tPsi, vUv + vec2(0.0, -tx.y)).r;

  float psi = (pE + pW + pN + pS + dx * dx * omega) / 4.0;

  gl_FragColor = vec4(psi, 0.0, 0.0, 1.0);
}`;

// Semi-Lagrangian advection + explicit viscous diffusion
// 1. Compute velocity from streamfunction: u = ∂ψ/∂y, v = -∂ψ/∂x
// 2. Trace particle backward: pos_back = pos - dt * velocity
// 3. Sample vorticity at back-traced position (bilinear interpolation via LinearFilter)
// 4. Add explicit viscous diffusion: ν · ∇²ω
const ADVECT_FRAG = `
precision highp float;
uniform sampler2D tOmega;
uniform sampler2D tPsi;
uniform vec2 resolution;
uniform float nu, dt;
varying vec2 vUv;

void main() {
  vec2 tx = 1.0 / resolution;
  float dx = tx.x;

  // Velocity from streamfunction via central differences
  float pE = texture2D(tPsi, vUv + vec2( tx.x, 0.0)).r;
  float pW = texture2D(tPsi, vUv + vec2(-tx.x, 0.0)).r;
  float pN = texture2D(tPsi, vUv + vec2(0.0,  tx.y)).r;
  float pS = texture2D(tPsi, vUv + vec2(0.0, -tx.y)).r;

  float u = (pN - pS) / (2.0 * dx);    // ∂ψ/∂y
  float v = -(pE - pW) / (2.0 * dx);   // -∂ψ/∂x

  // Semi-Lagrangian backtrace (periodic domain via RepeatWrapping)
  vec2 backPos = vUv - dt * vec2(u, v);
  float omegaAdv = texture2D(tOmega, backPos).r;

  // Explicit viscous diffusion using current field
  float oC = texture2D(tOmega, vUv).r;
  float oE = texture2D(tOmega, vUv + vec2( tx.x, 0.0)).r;
  float oW = texture2D(tOmega, vUv + vec2(-tx.x, 0.0)).r;
  float oN = texture2D(tOmega, vUv + vec2(0.0,  tx.y)).r;
  float oS = texture2D(tOmega, vUv + vec2(0.0, -tx.y)).r;
  float laplacian = (oE + oW + oN + oS - 4.0 * oC) / (dx * dx);

  float omegaNew = omegaAdv + dt * nu * laplacian;

  // Clamp to prevent floating-point blowup
  omegaNew = clamp(omegaNew, -200.0, 200.0);

  gl_FragColor = vec4(omegaNew, 0.0, 0.0, 1.0);
}`;

// Vorticity → color via diverging colormap
const DISPLAY_FRAG = `
precision highp float;
uniform sampler2D tOmega;
uniform float omegaMax;
uniform int colormap;
varying vec2 vUv;

// Colormap 0: Cyan-Orange (dark background)
vec3 cyanOrange(float t) {
  vec3 neg = vec3(0.10, 0.55, 0.85);
  vec3 zero = vec3(0.03, 0.03, 0.08);
  vec3 pos = vec3(0.90, 0.40, 0.10);
  return t < 0.0 ? mix(zero, neg, sqrt(-t)) : mix(zero, pos, sqrt(t));
}

// Colormap 1: Cool-Warm (Moreland diverging)
vec3 coolWarm(float t) {
  vec3 neg = vec3(0.23, 0.30, 0.75);
  vec3 zero = vec3(0.87, 0.87, 0.87);
  vec3 pos = vec3(0.71, 0.02, 0.15);
  float a = abs(t);
  vec3 c = t < 0.0 ? mix(zero, neg, a) : mix(zero, pos, a);
  return c;
}

// Colormap 2: Inferno-style (sequential, absolute value)
vec3 inferno(float t) {
  float a = abs(t);
  a = clamp(a, 0.0, 1.0);
  vec3 c0 = vec3(0.001, 0.001, 0.014);
  vec3 c1 = vec3(0.107, 0.564, 3.933);
  vec3 c2 = vec3(11.602, -3.973, -15.942);
  vec3 c3 = vec3(-41.704, 17.436, 44.354);
  vec3 c4 = vec3(77.163, -33.402, -81.807);
  vec3 c5 = vec3(-73.683, 32.626, 73.210);
  vec3 c6 = vec3(27.163, -12.584, -23.070);
  return clamp(c0+a*(c1+a*(c2+a*(c3+a*(c4+a*(c5+a*c6))))), 0.0, 1.0);
}

void main() {
  float omega = texture2D(tOmega, vUv).r;
  float t = clamp(omega / omegaMax, -1.0, 1.0);

  vec3 color;
  if (colormap == 0) color = cyanOrange(t);
  else if (colormap == 1) color = coolWarm(t);
  else color = inferno(t);

  gl_FragColor = vec4(color, 1.0);
}`;

// ── Configuration ───────────────────────────────────────────────

const SIM_SIZE = 128;
const DISPLAY_SIZE = 512;

// ── State ───────────────────────────────────────────────────────

let paused = false;
let iterCount = 0;
let jacobiIters = 40;
let stepsPerFrame = 8;
let dt = 0.005;
let colormapIdx = 0;

// Physics
let nu = 0.001;
// Initial condition
let vShear = 2.0;
let delta = 0.05;
let aPert = 0.1;
let kPert = 4.0;

// ── Three.js Setup ──────────────────────────────────────────────

const $ = sel => document.querySelector(sel);

let renderer;
try {
  renderer = new THREE.WebGLRenderer({ antialias: false, preserveDrawingBuffer: true });
} catch (e) {
  $('#error-msg').style.display = 'block';
  $('#error-msg').textContent = 'WebGL not available: ' + e.message;
  throw e;
}

renderer.setSize(DISPLAY_SIZE, DISPLAY_SIZE);
renderer.setPixelRatio(1);
renderer.setClearColor(0x000000, 1);
$('#canvas-wrapper').appendChild(renderer.domElement);

// Check float texture support
const gl = renderer.getContext();
if (gl instanceof WebGL2RenderingContext) {
  const ext = gl.getExtension('EXT_color_buffer_float');
  if (!ext) console.warn('EXT_color_buffer_float not available — float render targets may not work');
}

const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const scene = new THREE.Scene();
const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2));
scene.add(mesh);

// ── Render Targets ──────────────────────────────────────────────

function makeRT(filter) {
  return new THREE.WebGLRenderTarget(SIM_SIZE, SIM_SIZE, {
    wrapS: THREE.RepeatWrapping,
    wrapT: THREE.RepeatWrapping,
    minFilter: filter,
    magFilter: filter,
    type: THREE.FloatType,
    format: THREE.RGBAFormat,
    depthBuffer: false,
    stencilBuffer: false
  });
}

// omega: LinearFilter for bilinear interpolation in Semi-Lagrangian backtrace
const omega = [makeRT(THREE.LinearFilter), makeRT(THREE.LinearFilter)];
// psi: NearestFilter (sampled at exact grid points only)
const psi = [makeRT(THREE.NearestFilter), makeRT(THREE.NearestFilter)];

let curOmega = 0;
let curPsi = 0;

// ── Materials ───────────────────────────────────────────────────

const initMat = new THREE.ShaderMaterial({
  uniforms: {
    resolution: { value: new THREE.Vector2(SIM_SIZE, SIM_SIZE) },
    vShear: { value: vShear },
    delta: { value: delta },
    aPert: { value: aPert },
    kPert: { value: kPert }
  },
  vertexShader: VERT,
  fragmentShader: INIT_FRAG
});

const jacobiMat = new THREE.ShaderMaterial({
  uniforms: {
    tOmega: { value: null },
    tPsi: { value: null },
    resolution: { value: new THREE.Vector2(SIM_SIZE, SIM_SIZE) }
  },
  vertexShader: VERT,
  fragmentShader: JACOBI_FRAG
});

const advectMat = new THREE.ShaderMaterial({
  uniforms: {
    tOmega: { value: null },
    tPsi: { value: null },
    resolution: { value: new THREE.Vector2(SIM_SIZE, SIM_SIZE) },
    nu: { value: nu },
    dt: { value: dt }
  },
  vertexShader: VERT,
  fragmentShader: ADVECT_FRAG
});

const displayMat = new THREE.ShaderMaterial({
  uniforms: {
    tOmega: { value: null },
    omegaMax: { value: vShear / delta },
    colormap: { value: 0 }
  },
  vertexShader: VERT,
  fragmentShader: DISPLAY_FRAG
});

// ── Simulation ──────────────────────────────────────────────────

function initSimulation() {
  // Render initial vorticity field to omega[0]
  initMat.uniforms.vShear.value = vShear;
  initMat.uniforms.delta.value = delta;
  initMat.uniforms.aPert.value = aPert;
  initMat.uniforms.kPert.value = kPert;

  mesh.material = initMat;
  renderer.setRenderTarget(omega[0]);
  renderer.render(scene, camera);

  // Clear psi and omega[1] to zero
  renderer.setRenderTarget(omega[1]);
  renderer.clear();
  renderer.setRenderTarget(psi[0]);
  renderer.clear();
  renderer.setRenderTarget(psi[1]);
  renderer.clear();

  curOmega = 0;
  curPsi = 0;
  iterCount = 0;

  // Warm-up: solve Poisson from scratch with many iterations.
  // Jacobi converges slowly (ρ ≈ cos(π/N) ≈ 0.9997 for N=128), so we need
  // hundreds of iterations to build up the low-frequency streamfunction that
  // carries the background shear velocity driving the KH instability.
  // Subsequent timesteps only need ~40 iterations (warm-started from previous ψ).
  const WARMUP_ITERS = 500;
  mesh.material = jacobiMat;
  jacobiMat.uniforms.tOmega.value = omega[0].texture;
  for (let j = 0; j < WARMUP_ITERS; j++) {
    jacobiMat.uniforms.tPsi.value = psi[curPsi].texture;
    const nextPsi = 1 - curPsi;
    renderer.setRenderTarget(psi[nextPsi]);
    renderer.render(scene, camera);
    curPsi = nextPsi;
  }

  // Update display scale — use 0.5× peak vorticity for better contrast
  // (as the field evolves, vorticity spreads and weakens)
  displayMat.uniforms.omegaMax.value = 0.5 * vShear / delta;

  updateInfo();
  display();
}

function step() {
  // Phase 1: Poisson solve for streamfunction
  // ∇²ψ = -ω  →  40 Jacobi iterations, warm-started from previous timestep
  mesh.material = jacobiMat;
  jacobiMat.uniforms.tOmega.value = omega[curOmega].texture;

  for (let j = 0; j < jacobiIters; j++) {
    jacobiMat.uniforms.tPsi.value = psi[curPsi].texture;
    const nextPsi = 1 - curPsi;
    renderer.setRenderTarget(psi[nextPsi]);
    renderer.render(scene, camera);
    curPsi = nextPsi;
  }

  // Phase 2: Semi-Lagrangian advection + explicit diffusion
  mesh.material = advectMat;
  advectMat.uniforms.tOmega.value = omega[curOmega].texture;
  advectMat.uniforms.tPsi.value = psi[curPsi].texture;
  advectMat.uniforms.nu.value = nu;
  advectMat.uniforms.dt.value = dt;

  const nextOmega = 1 - curOmega;
  renderer.setRenderTarget(omega[nextOmega]);
  renderer.render(scene, camera);
  curOmega = nextOmega;

  iterCount++;
}

function display() {
  mesh.material = displayMat;
  displayMat.uniforms.tOmega.value = omega[curOmega].texture;
  displayMat.uniforms.colormap.value = colormapIdx;
  renderer.setRenderTarget(null);
  renderer.render(scene, camera);
}

function updateInfo() {
  $('#iter-num').textContent = iterCount;
  const re = vShear / nu;
  $('#re-val').textContent = re >= 10000 ? re.toExponential(1) : Math.round(re).toLocaleString();
}

// ── Animation Loop ──────────────────────────────────────────────

function update() {
  if (!paused) {
    for (let i = 0; i < stepsPerFrame; i++) step();
    display();
    updateInfo();
  }
  requestAnimationFrame(update);
}

// ── UI Wiring ───────────────────────────────────────────────────

// Viscosity uses log-scale slider for better control over orders of magnitude
function wireSlider(id, getter, setter, formatter) {
  const sl = $(`#sl-${id}`);
  const val = $(`#val-${id}`);
  val.textContent = formatter(getter());
  sl.addEventListener('input', () => {
    setter(parseFloat(sl.value));
    val.textContent = formatter(getter());
  });
}

wireSlider('nu',
  () => nu,
  v => { nu = Math.pow(10, v); },
  () => nu.toFixed(4)
);

wireSlider('vshear',
  () => vShear,
  v => { vShear = v; },
  v => v.toFixed(1)
);

wireSlider('delta',
  () => delta,
  v => { delta = v; },
  v => v.toFixed(3)
);

wireSlider('apert',
  () => aPert,
  v => { aPert = v; },
  v => v.toFixed(2)
);

wireSlider('kpert',
  () => kPert,
  v => { kPert = v; },
  v => v.toFixed(1)
);

wireSlider('dt',
  () => dt,
  v => { dt = v; },
  v => v.toFixed(3)
);

wireSlider('spf',
  () => stepsPerFrame,
  v => { stepsPerFrame = Math.round(v); },
  v => String(Math.round(v))
);

wireSlider('jacobi',
  () => jacobiIters,
  v => { jacobiIters = Math.round(v); },
  v => String(Math.round(v))
);

// Play / Pause
$('#btn-play').addEventListener('click', () => {
  paused = !paused;
  $('#btn-play').textContent = paused ? 'Play' : 'Pause';
});

// Reset
$('#btn-reset').addEventListener('click', () => initSimulation());

// Colormap selector
document.querySelectorAll('.cmap-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cmap-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    colormapIdx = parseInt(btn.dataset.cmap);
    if (paused) display();
  });
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); $('#btn-play').click(); }
  if (e.key === 'r') { $('#btn-reset').click(); }
});

// ── Start ───────────────────────────────────────────────────────

initSimulation();
update();

</script>
</body>
</html>
